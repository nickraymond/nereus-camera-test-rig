# OpenMV AE3 camera profile — Spec §8.
#
# Verified on real hardware on 2026-07-15 (AE3 bring-up recon, serial 0829c14000000000):
# MicroPython 1.25.0-preview (sysname "alif"), machine "OpenMV-AE3 with AE302F80F55D5AE",
# sensor PAG7936 (sensor.get_id() == 0x7936 — the same sensor as the N6, re-probed on the
# AE3's firmware). The authoritative values live in openmv/ae3/board_config.py (the board
# validates settings against that allowlist); this profile mirrors the host-facing defaults.

board: "ae3"
device_id: "openmv-ae3-001"     # stable logical label; hardware identity is the USB serial
firmware: "1.25.0-preview"      # os.uname().release, verified 2026-07-15

# Hard-reset the board before each coordinated capture (~4 s). The board stays powered
# between experiments and this firmware's AWB state can survive sensor.reset(): after
# lights-off runs on 2026-07-16 every capture had a strong green cast (grey dE 39.7)
# until a hard reset. This firmware exposes no AWB control for the PAG7936, so a hard
# reset is the only in-band cure. Cheap insurance for experiment discipline (§10).
reset_before_capture: true

# Capture settings — verified supported on the AE3/PAG7936 firmware (recon 2026-07-15).
image:
  framesize: "HD"               # 1280x800 (max); also supported: VGA (640x400), QVGA (320x200)
  pixel_format: "RGB565"        # also supported: GRAYSCALE
  jpeg_quality: 90
  warmup_ms: 2000               # let auto-exposure settle before the snapshot

# Short-clip video not yet verified on the AE3 (OQ-4); disabled until confirmed. Live
# focus streaming (start_stream) is available via the shared capture service.
video:
  enabled: false
