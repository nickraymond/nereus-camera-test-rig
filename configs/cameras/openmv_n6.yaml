# OpenMV N6 camera profile — Spec §8.
#
# PLACEHOLDER only. There is NO OpenMV prior art and every field/value here is
# UNVERIFIED (see OQ-1..OQ-6 in docs/open_questions.md). The settings below mirror
# the illustrative Spec §8 example and MUST be confirmed against official OpenMV
# firmware/docs before use. Do not treat as authoritative.

board: "n6"
device_id: null                 # assigned/discovered via USB handshake (OQ-2)
firmware: null                  # real value once a board is in hand (OQ-5)

# Hard-reset the board before each coordinated capture (~4 s), clearing any firmware 3A
# state left by a previous experiment (stale-AWB hazard observed on the AE3 2026-07-16;
# the N6's firmware recovered on its own, but the reset keeps every experiment starting
# from the same known state — one variable at a time, CLAUDE.md §10).
reset_before_capture: true

# Illustrative capture settings from Spec §8 — verify supported values (OQ-1).
image:
  framesize: "native"           # UNVERIFIED
  pixel_format: "rgb565"        # UNVERIFIED
  jpeg_quality: 90              # UNVERIFIED
  warmup_frames: 10             # UNVERIFIED

# Video support is unknown per board (OQ-4); disabled until verified.
video:
  enabled: false
